name: Publish report

# Rebuilds the HTML report from the committed results snapshot (results/) and
# force-pushes it to the gh-pages branch, which GitHub Pages serves.
# No games are played in CI; the site never lives on code branches.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'results/**'
      - 'experiments/report/**'
      - '.github/workflows/report.yml'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml plotly
      - run: python -m experiments.report results/all_games.yaml --config results/experiment.yaml --out site
      - name: Push site to gh-pages
        run: |
          touch site/.nojekyll
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish report from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
