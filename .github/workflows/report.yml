name: Publish report

# Rebuilds the HTML report from the committed results snapshot (results/) and
# publishes it to GitHub Pages. No games are played in CI.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'results/**'
      - 'experiments/report/**'
      - '.github/workflows/report.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml plotly
      - run: python -m experiments.report results/all_games.yaml --config results/experiment.yaml --out report_site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
